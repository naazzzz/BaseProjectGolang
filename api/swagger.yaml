basePath: /api
definitions:
  dto.DataLoginResponse:
    properties:
      expires_at:
        type: string
      token:
        type: string
      token_type:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      password:
        minLength: 3
        type: string
      username:
        maxLength: 191
        type: string
    required:
    - password
    - username
    type: object
  error.HTTPError:
    properties:
      data:
        additionalProperties: true
        type: object
      message: {}
      metadata:
        additionalProperties: true
        type: object
      statusCode:
        type: integer
      title:
        type: string
    type: object
info:
  contact: {}
  description: Monitoring API
  title: Monitoring service
  version: "1.0"
paths:
  /api/login:
    post:
      consumes:
      - application/json
      description: Login endpoint
      parameters:
      - description: Dto для логина
        in: body
        name: dto.LoginRequest
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DataLoginResponse'
        default:
          description: The body of any response with an error
          schema:
            $ref: '#/definitions/error.HTTPError'
      summary: Login endpoint
      tags:
      - Login
  /api/logout:
    get:
      consumes:
      - application/json
      description: Logout endpoint
      produces:
      - application/json
      responses:
        "200":
          description: 'message: Successfully logged out.'
          schema:
            type: string
        default:
          description: The body of any response with an error
          schema:
            $ref: '#/definitions/error.HTTPError'
      security:
      - BearerToken: []
      summary: Logout endpoint
      tags:
      - Logout
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
