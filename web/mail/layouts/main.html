<!--Базовый шаблон для шаблонизатора-->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{.Title}}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .main-content {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 0 0 8px 8px;
            border: 1px solid #dee2e6;
            border-top: none;
        }
    </style>
</head>
<body>
{{template "header" .}}

<div class="main-content">
    {{embed}}
</div>

{{template "footer" .}}

</body>
</html>
